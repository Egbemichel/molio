{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — EgbeMichel</title>
  <link rel="shortcut icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'dist/css/main.css' %}">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: white;
      font-family: 'DM Sans', sans-serif;
    }
    .lost-wrap img {
      width: 320px;
      max-width: 80vw;
      border-radius: 12px;
    }
    .lost-wrap p {
      margin-top: 1.5rem;
      text-align: right;
      padding-right: 1.5rem; /* ← adjust right alignment here */
      font-size: 1rem;
      line-height: 1.6;
      color: #333;
    }
    .lost-wrap a {
      display: block;
      margin-top: 1rem;
      text-align: right;
      padding-right: 1.5rem; /* ← matches text alignment above */
      font-size: 0.9rem;
      color: inherit;
      opacity: 0.6;
      text-decoration: underline;
    }
    .lost-wrap a:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="lost-wrap">
    <img src="{% static 'images/404.png' %}" alt="Me looking confused">
    <p class="font-hagia" >
      Huh. Even I don't know where this page went.<br>
      And I built the thing.
    </p>
    <a href="/">← take me somewhere that exists</a>
  </div>
</body>
</html>
