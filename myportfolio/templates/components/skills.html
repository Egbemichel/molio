{% load static %}
{% comment %}
Skills carousel section with marquee animation
@param: skills - List of skill objects with 'name' and 'icon' properties
{% endcomment %}

<section class="bg-white py-3 overflow-hidden marquee-container" 
         x-data="skillsData()">

    <div class="flex mb-12">
        <div class="flex animate-marquee whitespace-nowrap">
            <template x-for="i in 2">
                <div class="flex">
                    <template x-for="skill in firstRow" :key="skill.name">
                        <div class="flex items-center bg-white border border-[#A05A5A]/30 rounded-3xl px-10 py-8 mx-6 shadow-sm min-w-[320px]">
                            <img :src="skill.icon" :alt="skill.name" class="w-20 h-20 object-contain mr-6">
                            <span class="font-hagia font-medium text-3xl text-dark" x-text="skill.name"></span>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </div>

    <div class="flex mb-12">
        <div class="flex animate-marquee-reverse whitespace-nowrap">
            <template x-for="i in 2">
                <div class="flex">
                    <template x-for="skill in secondRow" :key="skill.name">
                        <div class="flex items-center bg-white border border-dark/30 rounded-3xl px-10 py-8 mx-6 shadow-sm min-w-[320px]">
                            <img :src="skill.icon" :alt="skill.name" class="w-20 h-20 object-contain mr-6">
                            <span class="font-hagia font-medium text-3xl text-dark" x-text="skill.name"></span>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </div>

    <div class="flex">
        <div class="flex animate-marquee whitespace-nowrap">
            <template x-for="i in 2">
                <div class="flex">
                    <template x-for="skill in thirdRow" :key="skill.name">
                        <div class="flex items-center bg-white border border-[#A05A5A]/30 rounded-3xl px-10 py-8 mx-6 shadow-sm min-w-[320px]">
                            <img :src="skill.icon" :alt="skill.name" class="w-20 h-20 object-contain mr-6">
                            <span class="font-hagia font-medium text-3xl text-dark" x-text="skill.name"></span>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </div>
</section>

<script>
    function skillsData() {
        return {
            skills: {{ skills_json|safe }},
            get firstRow() { 
                const thirdLength = Math.ceil(this.skills.length / 3);
                return this.skills.slice(0, thirdLength) 
            },
            get secondRow() { 
                const thirdLength = Math.ceil(this.skills.length / 3);
                return this.skills.slice(thirdLength, thirdLength * 2) 
            },
            get thirdRow() { 
                const thirdLength = Math.ceil(this.skills.length / 3);
                return this.skills.slice(thirdLength * 2) 
            },
        }
    }
</script>
