{% load static %}

<section x-data="{ 
    activeCategory: 0, 
    projectIndex: 0,
    isTransitioning: false,
    categories: [
        {% for cat in categories %}
        {% if cat.projects.exists %} {# Only include categories that have projects #}
        {
            name: '{{ cat.name|escapejs }}',
            projects: [
                {% for p in cat.projects.all %}
                {
                    title: '{{ p.title|escapejs }}',
                    role: '{{ p.role|escapejs }}',
                    date: '{{ p.date_range|escapejs }}',
                    desc: '{{ p.description|escapejs }}',
                    points: {{ p.points|safe|default:'[]' }},
                    mockup: '{% if p.mockup %}{{ p.mockup.url }}{% endif %}',
                    logo: '{% if p.logo %}{{ p.logo.url }}{% endif %}',
                    github: '{{ p.github_link|default:"#" }}',
                    tech: [
                        {% for t in p.technologies.all|slice:':3' %}
                        { name: '{{ t.name|escapejs }}', icon: '{% if t.image %}{{ t.image.url }}{% endif %}' }{% if not forloop.last %},{% endif %}
                        {% endfor %}
                    ]
                }{% if not forloop.last %},{% endif %}
                {% endfor %}
            ]
        }{% if not forloop.last %},{% endif %}
        {% endif %}
        {% endfor %}
    ]
}"
style="display: none;"
:style="{ display: 'flex' }"
class="relative min-h-screen w-full flex items-center justify-center p-8 md:p-16 bg-white">

    <img src="{% static 'images/grid-background.png' %}" class="absolute inset-0 w-full h-full object-cover opacity-20 pointer-events-none">

    <div class="max-w-[100rem] w-full relative z-10 px-[60px]">
        <h2 class="font-hagia font medium text-5xl mb-12" x-show="categories && categories.length > 0">Work Experience</h2> 

        <template x-if="categories && categories.length > 0 && categories[activeCategory] && categories[activeCategory].projects && categories[activeCategory].projects.length > 0">
            <div class="grid grid-cols-12 gap-8 w-full">
                <div class="col-span-3 flex flex-col space-y-6 border-l-4 border-accent/10 pl-6">
                <template x-for="(cat, index) in categories" :key="index">
                    <button 
                        @click="activeCategory = index; projectIndex = 0"
                        :class="activeCategory === index ? 'text-accent opacity-100' : 'text-dark opacity-40'"
                        class="font-hagia font-medium text-4xl text-left transition-all hover:opacity-100"
                        x-text="cat.name">
                    </button>
                </template>
            </div>

            <div class="col-span-7 bg-primary backdrop-blur-md rounded-[2.5rem] p-12 shadow-2xl border-white flex gap-10 min-h-[500px] transition-all duration-500"
                 :class="isTransitioning ? 'opacity-0 scale-95' : 'opacity-100 scale-100'">
                
                <div class="w-1/3 flex items-center justify-center overflow-hidden">
                    <img :src="categories[activeCategory].projects[projectIndex].mockup" 
                         class="w-full h-auto drop-shadow-3xl transition-all duration-700"
                         :class="isTransitioning ? 'scale-110 opacity-0' : 'scale-100 opacity-100'">
                </div>

                <div class="w-2/3 flex flex-col transition-all duration-700"
                     :class="isTransitioning ? 'opacity-0 translate-x-4' : 'opacity-100 translate-x-0'">
                    <img :src="categories[activeCategory].projects[projectIndex].logo" class="h-12 w-fit mb-2 self-end">
                    <p class="font-hagia font-medium text-2xl text-dark text-right" x-text="categories[activeCategory].projects[projectIndex].role"></p>
                    <p class="font-hagia text-2xl text-dark uppercase mb-6 text-right" x-text="categories[activeCategory].projects[projectIndex].date"></p>
                    
                    <p class="font-hagia text-4xl mb-6 text-right" x-text="categories[activeCategory].projects[projectIndex].desc"></p>
                    
                    <ul class="space-y-3 flex-grow">
                        <template x-for="point in categories[activeCategory].projects[projectIndex].points">
                            <li class="flex gap-3 text-sm font-hagia text-dark">
                                <span class="text-green-600 text-2xl">✓</span> <span class="text-3xl" x-text="point"></span>
                            </li>
                        </template>
                    </ul>

                    <a :href="categories[activeCategory].projects[projectIndex].github" class="self-end text-2xl underline opacity-50 hover:opacity-100">GitHub Link ↗</a>
                </div>
            </div>

            <div class="col-span-2 flex flex-col gap-4">
                <div class="flex flex-col gap-4 transition-all duration-700"
                     :class="isTransitioning ? 'opacity-0 -translate-y-4' : 'opacity-100 translate-y-0'">
                    <template x-for="(t, idx) in categories[activeCategory].projects[projectIndex].tech" :key="idx">
                        <div class="bg-gray-100/50 rounded-2xl p-2 flex items-center justify-center aspect-square transition-all duration-500 hover:scale-105 border border-white/50 hover:border-accent/50 hover:shadow-lg"
                             :style="!isTransitioning ? `transition-delay: ${idx * 100}ms; opacity: 1; transform: scale(1);` : 'opacity: 0; transform: scale(0.8);'">
                            <img :src="t.icon" :alt="t.name" class="w-32 h-32 object-contain">
                        </div>
                    </template>
                </div>

                <div class="flex flex-col h-full gap-4">
                    <button 
                        @click="async () => {
                            isTransitioning = true;
                            await new Promise(resolve => setTimeout(resolve, 300));
                            projectIndex = (projectIndex > 0) ? projectIndex - 1 : categories[activeCategory].projects.length - 1;
                            isTransitioning = false;
                        }"
                        class="bg-dark text-white rounded-3xl p-8 hover:bg-accent transition-all duration-300 flex items-center justify-center hover:scale-110 active:scale-95 shadow-lg hover:shadow-xl">
                        <span class="text-3xl rotate-[-90deg]">❯</span>
                    </button>

                    <button 
                        @click="async () => {
                            isTransitioning = true;
                            await new Promise(resolve => setTimeout(resolve, 300));
                            projectIndex = (projectIndex < categories[activeCategory].projects.length - 1) ? projectIndex + 1 : 0;
                            isTransitioning = false;
                        }"
                        class="bg-dark text-white rounded-3xl p-8 hover:bg-accent transition-all duration-300 flex items-center justify-center flex-grow hover:scale-110 active:scale-95 shadow-lg hover:shadow-xl">
                        <span class="text-3xl rotate-90">❯</span>
                    </button>
                </div>
            </div>

        </div>
        </template>
    </div>
</section>
