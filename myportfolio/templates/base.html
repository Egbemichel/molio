{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}EgbeMichel — molio{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="shortcut icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'dist/css/main.css' %}">

  <!-- Fancybox CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0.29/dist/fancybox/fancybox.css" />

  {% block extra_head %}{% endblock %}
</head>
<body class="bg-primary antialiased">

  <main>{% block content %}{% endblock %}</main>

  <!--
    SCRIPT LOADING ORDER MATTERS:
    1. CDN libraries first (synchronous, no defer/async) so they are available
       when main.js (type=module) executes.
    2. Alpine.js last with defer so it doesn't block.
  -->

  <!-- GSAP core — required for page loader -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
 
  <!-- HotKeys.js -->
  <script src="https://cdn.jsdelivr.net/npm/hotkeys-js@3.13.7/dist/hotkeys.min.js"></script>

  <!-- Howler.js -->
  <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>

  <!-- Fancybox -->
  <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0.29/dist/fancybox/fancybox.umd.js"></script>


  <!-- Main app — type="module" for ES import/export support -->
  <script type="module" src="{% static 'src/js/main.js' %}"></script>

  <!-- Alpine.js — must come AFTER main.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

  {% block extra_js %}{% endblock %}
</body>
</html>
